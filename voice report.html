<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Support Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center mb-4">🎤 Voice Support Request</h2>

        <button class="btn btn-primary" onclick="startVoice()">
            Start Recording
        </button>

        <div class="mt-4">
            <h5>Voice to Text Result:</h5>
            <p id="voiceText" class="border p-3">
                Your speech will appear here...
            </p>
        </div>
    </div>
</div>

<script>
function startVoice() {

    alert("Voice recording started. Please speak now.");

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Speech Recognition is not supported in this browser.");
        return;
    }

    const recognition = new SpeechRecognition();

    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.start();

    recognition.onresult = function(event) {
        document.getElementById("voiceText").innerText =
            event.results[0][0].transcript;

        alert("Voice converted to text successfully!");
    };

    recognition.onerror = function(event) {
        alert("Error: " + event.error);
    };
}
</script>

</body>
</html>
