<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker - Register</title>  
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- <link href="frontend.html"> -->

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:400px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1); 
    transform: translate(10px);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9; 
    transform: translate(10px);
}
</style>
</head>
<body>

<div class="container">

    <h2>Customer support Ticket Registration</h2>

    <form onsubmit="registerUser(event)">

        <input type="text" id="name" placeholder="Full Name" required>

        <input type="email" id="email" placeholder="Email Address" required>

        <input type="tel" id="phone" placeholder="Phone Number" required>

        <input type="date" id="dob" required>

        <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <input type="password" id="password" placeholder="Password" required>

        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

        <!-- <button type="submit">Register</button>  --> 

        <!-- <button class="btn btn-light "> Register </button>  -->

        <!-- <div class="text-center mt-3">
            <a href="Ticket page.html" class="btn btn-primary ms-1 mt-3"> Ticket Page </a>
        </div> --> 

       <a href="login.html" class="btn bg-success border-1 text-light shadow"> Register  </a>

            
         

    </form>

</div>

<script>

function registerUser(event){

    event.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const dob = document.getElementById("dob").value;
    const gender = document.getElementById("gender").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    const user = {
        name,
        email,
        phone,
        dob,
        gender
    };

    localStorage.setItem(
        "habitTrackerUser",
        JSON.stringify(user)
    );

    alert("Registration Successful!");

    // Redirect to Habit Tracker Dashboard
    window.location.href = "index.html";
} 



const user = {
    name,
    email,
    phone,
    dob,
    gender
};

localStorage.setItem(
    "habitTrackerUser",
    JSON.stringify(user)
);

</script>   





</body>
</html>
